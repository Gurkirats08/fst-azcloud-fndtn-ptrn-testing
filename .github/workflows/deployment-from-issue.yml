name: Deployment Request Dispatcher

on:
  issues:
    types: [opened, labeled, edited, reopened]

jobs:
  dispatch:
    if: contains(github.event.issue.labels.*.name, 'deployment') || startsWith(github.event.issue.title, '[Deployment]')
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Parse issue and dispatch to subscription workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = context.payload.issue.body || '';

            function extractField(label) {
              const escaped = label.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
              const regex = new RegExp(`###\\s+${escaped}\\s*\\n+([\\s\\S]*?)(?=\\n###\\s+|$)`, 'i');
              const match = body.match(regex);
              if (!match) return '';
              return match[1]
                .trim()
                .split('\n')
                .map(line => line.trim())
                .filter(line => line && line !== '_No response_')
                .join(' ')
                .trim();
            }

            const rawSubscription = extractField('Deployment Subscription');
            if (!rawSubscription) {
              core.setFailed('Could not find Deployment Subscription field in issue body.');
              return;
            }

            const normalizedSubscription = rawSubscription.toLowerCase().replace(/[^a-z0-9]/g, '');
            const subscriptionAliases = {
              connectivity: 'connectivity',
              identity: 'identity',
              management: 'management',
              security: 'security',
              shared: 'sharedservices',
              sharedservice: 'sharedservices',
              sharedservices: 'sharedservices'
            };
            const subscription = subscriptionAliases[normalizedSubscription];
            if (!subscription) {
              core.setFailed(`Unknown Deployment Subscription value: '${rawSubscription}'.`);
              return;
            }

            const subscriptionId = extractField('Azure Subscription ID');
            if (!subscriptionId) {
              core.setFailed('Azure Subscription ID is required.');
              return;
            }

            const rawAction = extractField('Terraform Action') || 'plan';
            const action = rawAction.toLowerCase().trim();
            if (!['plan', 'apply', 'destroy'].includes(action)) {
              core.setFailed(`Invalid Terraform Action '${rawAction}'.`);
              return;
            }

            const rawEnvironment = extractField('GitHub Environment') || subscription;
            const normalizedEnvironment = rawEnvironment.toLowerCase().replace(/[^a-z0-9]/g, '');
            const environmentAliases = {
              connectivity: 'connectivity',
              identity: 'identity',
              management: 'management',
              security: 'security',
              shared: 'shared',
              sharedservice: 'shared',
              sharedservices: 'shared',
              nonproduction: 'NonProduction'
            };
            const environment = environmentAliases[normalizedEnvironment] || rawEnvironment;

            const workflowMap = {
              connectivity: 'alz-connectivity.yml',
              identity: 'alz-identity.yml',
              management: 'alz-management.yml',
              security: 'alz-security.yml',
              sharedservices: 'alz-sharedservices.yml'
            };
            const targetWorkflow = workflowMap[subscription];

            core.info(`Dispatching '${action}' to ${targetWorkflow} | environment=${environment} | subscriptionId=${subscriptionId}`);

            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: targetWorkflow,
              ref: 'main',
              inputs: {
                environment: environment,
                action: action,
                expected_subscription_id: subscriptionId
              }
            });

            core.info(`Successfully dispatched to ${targetWorkflow}`);