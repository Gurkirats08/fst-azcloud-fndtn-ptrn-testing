name: Dispatch ALZ Deploy from Issue

on:
  issues:
    types: [opened]

permissions:
  actions: write
  contents: read
  issues: write

jobs:
  dispatch:
    if: contains(github.event.issue.labels.*.name, 'deployment')
    runs-on: ubuntu-latest
    steps:
      - name: Parse deployment request from issue body
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';

            function extractField(label) {
              const escaped = label.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
              const regex = new RegExp(`###\\s+${escaped}\\s*\\n+([\\s\\S]*?)(?=\\n###\\s+|$)`, 'i');
              const match = body.match(regex);
              if (!match) return '';
              return match[1]
                .trim()
                .split('\n')
                .map(line => line.trim())
                .filter(line => line && line !== '_No response_')
                .join(' ')
                .trim();
            }

            const region = extractField('Azure Region');
            const subscription = extractField('Deployment Subscription');
            const subscriptionId = extractField('Azure Subscription ID');
            const action = extractField('Terraform Action');
            const environment = extractField('GitHub Environment') || 'NonProduction';

            const missing = [];
            if (!subscription) missing.push('Deployment Subscription');
            if (!subscriptionId) missing.push('Azure Subscription ID');
            if (!action) missing.push('Terraform Action');
            if (!environment) missing.push('GitHub Environment');

            if (missing.length > 0) {
              core.setFailed(`Missing required issue form fields: ${missing.join(', ')}`);
              return;
            }

            const validSubscriptions = ['connectivity', 'identity', 'management', 'security', 'sharedservices'];
            if (!validSubscriptions.includes(subscription)) {
              core.setFailed(`Invalid subscription value '${subscription}'.`);
              return;
            }

            if (!['plan', 'apply'].includes(action)) {
              core.setFailed(`Invalid Terraform Action '${action}'.`);
              return;
            }

            core.setOutput('region', region);
            core.setOutput('subscription', subscription);
            core.setOutput('subscription_id', subscriptionId);
            core.setOutput('action', action);
            core.setOutput('environment', environment);

      - name: Trigger ALZ workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'alz-run-all.yml',
              ref: context.payload.repository.default_branch,
              inputs: {
                subscription: '${{ steps.parse.outputs.subscription }}',
                environment: '${{ steps.parse.outputs.environment }}',
                action: '${{ steps.parse.outputs.action }}',
                expected_subscription_id: '${{ steps.parse.outputs.subscription_id }}',
                region: '${{ steps.parse.outputs.region }}'
              }
            });

      - name: Comment dispatch status
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.payload.issue.number;
            const body = [
              'Deployment workflow dispatched from this issue.',
              '',
              `- Subscription: ${{ steps.parse.outputs.subscription }}`,
              `- Subscription ID (requested): ${{ steps.parse.outputs.subscription_id }}`,
              `- Region: ${{ steps.parse.outputs.region }}`,
              `- Action: ${{ steps.parse.outputs.action }}`,
              `- Environment: ${{ steps.parse.outputs.environment }}`
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body
            });
