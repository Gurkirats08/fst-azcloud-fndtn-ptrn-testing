name: Dispatch ALZ Deploy from Issue

on:
  issues:
    types: [opened, labeled, edited, reopened]

permissions:
  actions: write
  contents: read
  issues: write

jobs:
  dispatch:
    if: contains(github.event.issue.labels.*.name, 'deployment') || startsWith(github.event.issue.title, '[Deployment]')
    runs-on: ubuntu-latest
    steps:
      - name: Parse deployment request from issue body
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';

            function extractField(label) {
              const escaped = label.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
              const regex = new RegExp(`###\\s+${escaped}\\s*\\n+([\\s\\S]*?)(?=\\n###\\s+|$)`, 'i');
              const match = body.match(regex);
              if (!match) return '';
              return match[1]
                .trim()
                .split('\n')
                .map(line => line.trim())
                .filter(line => line && line !== '_No response_')
                .join(' ')
                .trim();
            }

            const region = extractField('Azure Region');
            const rawSubscription = extractField('Deployment Subscription');
            const subscriptionId = extractField('Azure Subscription ID');
            const rawAction = extractField('Terraform Action');
            const rawEnvironment = extractField('GitHub Environment') || 'NonProduction';

            const normalizedSubscription = rawSubscription.toLowerCase().replace(/[^a-z0-9]/g, '');
            const subscriptionAliases = {
              connectivity: 'connectivity',
              identity: 'identity',
              identitydev: 'identity',
              management: 'management',
              security: 'security',
              shared: 'sharedservices',
              sharedservice: 'sharedservices',
              sharedservices: 'sharedservices'
            };
            const subscription = subscriptionAliases[normalizedSubscription] || '';

            const action = rawAction.toLowerCase().trim();

            const normalizedEnvironment = rawEnvironment.toLowerCase().replace(/[^a-z0-9]/g, '');
            const environmentAliases = {
              connectivity: 'connectivity',
              identity: 'identity',
              identitydev: 'identity',
              management: 'management',
              security: 'security',
              shared: 'shared',
              sharedservice: 'shared',
              sharedservices: 'shared',
              nonproduction: 'NonProduction'
            };
            const environment = environmentAliases[normalizedEnvironment] || rawEnvironment;

            const missing = [];
            if (!subscription) missing.push('Deployment Subscription');
            if (!subscriptionId) missing.push('Azure Subscription ID');
            if (!action) missing.push('Terraform Action');
            if (!environment) missing.push('GitHub Environment');

            if (missing.length > 0) {
              core.setFailed(`Missing required issue form fields: ${missing.join(', ')}`);
              return;
            }

            const validSubscriptions = ['connectivity', 'identity', 'management', 'security', 'sharedservices'];
            if (!validSubscriptions.includes(subscription)) {
              core.setFailed(`Invalid subscription value '${rawSubscription}'.`);
              return;
            }

            if (!['plan', 'apply', 'destroy'].includes(action)) {
              core.setFailed(`Invalid Terraform Action '${action}'.`);
              return;
            }

            const validEnvironments = ['connectivity', 'identity', 'management', 'security', 'shared', 'NonProduction'];
            if (!validEnvironments.includes(environment)) {
              core.setFailed(`Invalid GitHub Environment '${environment}'.`);
              return;
            }

            const workflowMap = {
              connectivity: 'alz-connectivity.yml',
              identity: 'alz-identity.yml',
              management: 'alz-management.yml',
              security: 'alz-security.yml',
              sharedservices: 'alz-sharedservices.yml'
            };

            const targetWorkflow = workflowMap[subscription];
            if (!targetWorkflow) {
              core.setFailed(`No target workflow configured for subscription '${subscription}'.`);
              return;
            }

            core.setOutput('region', region);
            core.setOutput('subscription', subscription);
            core.setOutput('subscription_id', subscriptionId);
            core.setOutput('action', action);
            core.setOutput('environment', environment);
            core.setOutput('target_workflow', targetWorkflow);

      - name: Trigger ALZ workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: '${{ steps.parse.outputs.target_workflow }}',
              ref: context.payload.repository.default_branch,
              inputs: {
                environment: '${{ steps.parse.outputs.environment }}',
                action: '${{ steps.parse.outputs.action }}',
                expected_subscription_id: '${{ steps.parse.outputs.subscription_id }}'
              }
            });

      - name: Comment dispatch status
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.payload.issue.number;
            const body = [
              'Deployment workflow dispatched from this issue.',
              '',
              `- Subscription: ${{ steps.parse.outputs.subscription }}`,
              `- Target Workflow: ${{ steps.parse.outputs.target_workflow }}`,
              `- Subscription ID (requested): ${{ steps.parse.outputs.subscription_id }}`,
              `- Region: ${{ steps.parse.outputs.region }}`,
              `- Action: ${{ steps.parse.outputs.action }}`,
              `- Environment: ${{ steps.parse.outputs.environment }}`
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body
            });
