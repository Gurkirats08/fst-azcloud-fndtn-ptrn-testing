name: ALZ Identity Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select Environment'
        required: true
        default: 'NonProduction'
        type: choice
        options:
          - NonProduction
      action:
        description: 'Terraform Action'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy
      expected_subscription_id:
        description: 'Expected Azure Subscription ID for safety validation'
        required: false
        type: string
  issues:
    types: [opened, labeled, edited, reopened]

env:
  TERRAFORM_VERSION: "1.6.0"
  TF_INPUT: false
  TF_IN_AUTOMATION: true
  GOLDREPO_REPOSITORY: Gurkirats08/fst-azcloud-goldrepo-testing
  GOLDREPO_REF: main

jobs:
  issue-dispatch:
    if: github.event_name == 'issues' && (contains(github.event.issue.labels.*.name, 'deployment') || startsWith(github.event.issue.title, '[Deployment]'))
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      issues: write
    steps:
      - name: Parse and dispatch identity workflow
        uses: actions/github-script@v7
        with:
          script: |
            const expectedSubscription = 'identity';
            const targetWorkflow = 'alz-identity.yml';
            const defaultEnvironment = 'identity';
            const body = context.payload.issue.body || '';

            function extractField(label) {
              const escaped = label.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
              const regex = new RegExp(`###\\s+${escaped}\\s*\\n+([\\s\\S]*?)(?=\\n###\\s+|$)`, 'i');
              const match = body.match(regex);
              if (!match) return '';
              return match[1]
                .trim()
                .split('\n')
                .map(line => line.trim())
                .filter(line => line && line !== '_No response_')
                .join(' ')
                .trim();
            }

            const rawSubscription = extractField('Deployment Subscription');
            if (!rawSubscription) {
              core.info('No deployment subscription field found. Skipping.');
              return;
            }

            const normalizedSubscription = rawSubscription.toLowerCase().replace(/[^a-z0-9]/g, '');
            const subscriptionAliases = {
              connectivity: 'connectivity',
              identity: 'identity',
              identitydev: 'identity',
              management: 'management',
              security: 'security',
              shared: 'sharedservices',
              sharedservice: 'sharedservices',
              sharedservices: 'sharedservices'
            };
            const subscription = subscriptionAliases[normalizedSubscription] || '';

            if (subscription !== expectedSubscription) {
              core.info(`Issue is for '${subscription}', skipping ${expectedSubscription} workflow.`);
              return;
            }

            const subscriptionId = extractField('Azure Subscription ID');
            const rawAction = extractField('Terraform Action') || 'plan';
            const rawEnvironment = extractField('GitHub Environment') || defaultEnvironment;
            const action = rawAction.toLowerCase().trim();

            const normalizedEnvironment = rawEnvironment.toLowerCase().replace(/[^a-z0-9]/g, '');
            const environmentAliases = {
              connectivity: 'connectivity',
              identity: 'identity',
              identitydev: 'identity',
              management: 'management',
              security: 'security',
              shared: 'shared',
              sharedservice: 'shared',
              sharedservices: 'shared',
              nonproduction: 'NonProduction'
            };
            const environment = environmentAliases[normalizedEnvironment] || rawEnvironment;

            if (!subscriptionId) {
              core.setFailed('Azure Subscription ID is required for deployment issues.');
              return;
            }

            if (!['plan', 'apply', 'destroy'].includes(action)) {
              core.setFailed(`Invalid Terraform Action '${rawAction}'.`);
              return;
            }

            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: targetWorkflow,
              ref: context.payload.repository.default_branch,
              inputs: {
                environment,
                action,
                expected_subscription_id: subscriptionId
              }
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `Dispatched ${targetWorkflow} with action '${action}' and environment '${environment}'.`
            });

  terraform-plan:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: identity
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout ptrn repo (tfvars)
        uses: actions/checkout@v4
        with:
          path: ptrn

      - name: Checkout gold repo (terraform root)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GOLDREPO_REPOSITORY }}
          ref: ${{ env.GOLDREPO_REF }}
          token: ${{ secrets.GOLDREPO_PAT || secrets.GITHUB_TOKEN }}
          path: goldrepo

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Azure Login (OIDC)
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Validate Requested Subscription ID
        if: ${{ github.event.inputs.expected_subscription_id != '' }}
        run: |
          REQUESTED_SUBSCRIPTION_ID="${{ github.event.inputs.expected_subscription_id }}"
          ACTUAL_SUBSCRIPTION_ID="${{ secrets.ARM_SUBSCRIPTION_ID }}"

          if [ "${REQUESTED_SUBSCRIPTION_ID,,}" != "${ACTUAL_SUBSCRIPTION_ID,,}" ]; then
            echo "Requested subscription ID does not match identity workflow subscription ID."
            echo "Requested: ${REQUESTED_SUBSCRIPTION_ID}"
            echo "Actual: ${ACTUAL_SUBSCRIPTION_ID}"
            exit 1
          fi

      - name: Terraform Init
        working-directory: ./goldrepo/alz-platform/pattern1/identity_dev
        env:
          ARM_USE_OIDC: true
          ARM_OIDC_TOKEN: ${{ env.ACTIONS_ID_TOKEN_REQUEST_TOKEN }}
          ARM_OIDC_TOKEN_REQUEST_URL: ${{ env.ACTIONS_ID_TOKEN_REQUEST_URL }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          TF_VAR_environment: ${{ github.event.inputs.environment }}
        run: terraform init -backend-config="backend.tfvars"

      - name: Terraform Format
        working-directory: ./goldrepo/alz-platform/pattern1/identity_dev
        continue-on-error: true
        run: terraform fmt -recursive

      - name: Terraform Validate
        working-directory: ./goldrepo/alz-platform/pattern1/identity_dev
        run: terraform validate

      - name: Terraform Plan
        working-directory: ./goldrepo/alz-platform/pattern1/identity_dev
        timeout-minutes: 30
        env:
          ARM_USE_OIDC: true
          ARM_OIDC_TOKEN: ${{ env.ACTIONS_ID_TOKEN_REQUEST_TOKEN }}
          ARM_OIDC_TOKEN_REQUEST_URL: ${{ env.ACTIONS_ID_TOKEN_REQUEST_URL }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          TF_VAR_environment: ${{ github.event.inputs.environment }}
        run: |
          TFVARS_FILE="${{ github.workspace }}/ptrn/alz-platform-vars/pattern1/identity.tfvars"

          if [ ! -f "$TFVARS_FILE" ]; then
            echo "❌ tfvars file not found: $TFVARS_FILE"
            exit 1
          fi

          echo "Using tfvars file: $TFVARS_FILE"

          MAX_RETRIES=3
          RETRY=0
          while [ $RETRY -lt $MAX_RETRIES ]; do
            echo "Terraform plan attempt $((RETRY + 1))/$MAX_RETRIES"
            terraform plan \
              -var-file="$TFVARS_FILE" \
              -out=tfplan-identity && break
            RETRY=$((RETRY + 1))
            if [ $RETRY -lt $MAX_RETRIES ]; then
              echo "Plan failed, waiting 30 seconds before retry..."
              sleep 30
            fi
          done

          if [ $RETRY -eq $MAX_RETRIES ]; then
            echo "❌ Failed to acquire state lock after $MAX_RETRIES attempts"
            exit 1
          fi

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-identity
          path: ./goldrepo/alz-platform/pattern1/identity_dev/tfplan-identity
          retention-days: 7

  approval:
    needs: terraform-plan
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'apply' || github.event.inputs.action == 'destroy'
    environment:
      name: ${{ github.event.inputs.environment }}
    steps:
      - name: Approval Checkpoint
        run: |
          echo "✅ Approval granted for identity deployment to ${{ github.event.inputs.environment }}"

  terraform-apply:
    needs: approval
    runs-on: ubuntu-latest
    environment: identity
    if: github.event.inputs.action == 'apply'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout ptrn repo (tfvars)
        uses: actions/checkout@v4
        with:
          path: ptrn

      - name: Checkout gold repo (terraform root)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GOLDREPO_REPOSITORY }}
          ref: ${{ env.GOLDREPO_REF }}
          token: ${{ secrets.GOLDREPO_PAT || secrets.GITHUB_TOKEN }}
          path: goldrepo

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Azure Login (OIDC)
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Validate Requested Subscription ID
        if: ${{ github.event.inputs.expected_subscription_id != '' }}
        run: |
          REQUESTED_SUBSCRIPTION_ID="${{ github.event.inputs.expected_subscription_id }}"
          ACTUAL_SUBSCRIPTION_ID="${{ secrets.ARM_SUBSCRIPTION_ID }}"

          if [ "${REQUESTED_SUBSCRIPTION_ID,,}" != "${ACTUAL_SUBSCRIPTION_ID,,}" ]; then
            echo "Requested subscription ID does not match identity workflow subscription ID."
            echo "Requested: ${REQUESTED_SUBSCRIPTION_ID}"
            echo "Actual: ${ACTUAL_SUBSCRIPTION_ID}"
            exit 1
          fi

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-identity
          path: ./goldrepo/alz-platform/pattern1/identity_dev

      - name: Terraform Init
        working-directory: ./goldrepo/alz-platform/pattern1/identity_dev
        env:
          ARM_USE_OIDC: true
          ARM_OIDC_TOKEN: ${{ env.ACTIONS_ID_TOKEN_REQUEST_TOKEN }}
          ARM_OIDC_TOKEN_REQUEST_URL: ${{ env.ACTIONS_ID_TOKEN_REQUEST_URL }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          TF_VAR_environment: ${{ github.event.inputs.environment }}
        run: terraform init -backend-config="backend.tfvars"

      - name: Terraform Apply
        timeout-minutes: 60
        working-directory: ./goldrepo/alz-platform/pattern1/identity_dev
        env:
          ARM_USE_OIDC: true
          ARM_OIDC_TOKEN: ${{ env.ACTIONS_ID_TOKEN_REQUEST_TOKEN }}
          ARM_OIDC_TOKEN_REQUEST_URL: ${{ env.ACTIONS_ID_TOKEN_REQUEST_URL }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          TF_VAR_environment: ${{ github.event.inputs.environment }}
        run: |
          if [ -f "tfplan-identity" ]; then
            terraform apply -auto-approve "tfplan-identity"
          else
            echo "❌ Plan file not found. Skipping apply."
            exit 1
          fi

  terraform-destroy:
    needs: approval
    runs-on: ubuntu-latest
    environment: identity
    if: github.event.inputs.action == 'destroy'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout ptrn repo (tfvars)
        uses: actions/checkout@v4
        with:
          path: ptrn

      - name: Checkout gold repo (terraform root)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GOLDREPO_REPOSITORY }}
          ref: ${{ env.GOLDREPO_REF }}
          token: ${{ secrets.GOLDREPO_PAT || secrets.GITHUB_TOKEN }}
          path: goldrepo

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Azure Login (OIDC)
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Validate Requested Subscription ID
        if: ${{ github.event.inputs.expected_subscription_id != '' }}
        run: |
          REQUESTED_SUBSCRIPTION_ID="${{ github.event.inputs.expected_subscription_id }}"
          ACTUAL_SUBSCRIPTION_ID="${{ secrets.ARM_SUBSCRIPTION_ID }}"

          if [ "${REQUESTED_SUBSCRIPTION_ID,,}" != "${ACTUAL_SUBSCRIPTION_ID,,}" ]; then
            echo "Requested subscription ID does not match identity workflow subscription ID."
            echo "Requested: ${REQUESTED_SUBSCRIPTION_ID}"
            echo "Actual: ${ACTUAL_SUBSCRIPTION_ID}"
            exit 1
          fi

      - name: Terraform Init
        working-directory: ./goldrepo/alz-platform/pattern1/identity_dev
        env:
          ARM_USE_OIDC: true
          ARM_OIDC_TOKEN: ${{ env.ACTIONS_ID_TOKEN_REQUEST_TOKEN }}
          ARM_OIDC_TOKEN_REQUEST_URL: ${{ env.ACTIONS_ID_TOKEN_REQUEST_URL }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          TF_VAR_environment: ${{ github.event.inputs.environment }}
        run: terraform init -backend-config="backend.tfvars"

      - name: Terraform Destroy
        timeout-minutes: 60
        working-directory: ./goldrepo/alz-platform/pattern1/identity_dev
        env:
          ARM_USE_OIDC: true
          ARM_OIDC_TOKEN: ${{ env.ACTIONS_ID_TOKEN_REQUEST_TOKEN }}
          ARM_OIDC_TOKEN_REQUEST_URL: ${{ env.ACTIONS_ID_TOKEN_REQUEST_URL }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          TF_VAR_environment: ${{ github.event.inputs.environment }}
        run: |
          TFVARS_FILE="${{ github.workspace }}/ptrn/alz-platform-vars/pattern1/identity.tfvars"

          if [ ! -f "$TFVARS_FILE" ]; then
            echo "❌ tfvars file not found: $TFVARS_FILE"
            exit 1
          fi

          terraform destroy -auto-approve -var-file="$TFVARS_FILE"

  deployment-summary:
    needs: terraform-plan
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && always()
    steps:
      - name: Generate Deployment Summary
        run: |
          echo "## 🎯 ALZ Identity Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Action:** ${{ github.event.inputs.action }}" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow Run:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
