name: ALZ Shared Services Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select Environment'
        required: true
        default: 'shared'

      action:
        description: 'Terraform Action'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy
      expected_subscription_id:
        description: 'Expected Azure Subscription ID for safety validation'
        required: false
        type: string
  issues:
    types: [opened, labeled, edited, reopened]

env:
  TERRAFORM_VERSION: "1.6.0"
  TF_INPUT: false
  TF_IN_AUTOMATION: true
  GOLDREPO_REPOSITORY: Gurkirats08/fst-azcloud-goldrepo-testing
  GOLDREPO_REF: main

jobs:
  issue-dispatch:
    if: github.event_name == 'issues' && (contains(github.event.issue.labels.*.name, 'deployment') || startsWith(github.event.issue.title, '[Deployment]'))
    outputs:
      should_run: ${{ steps.parse.outputs.should_run }}
      action: ${{ steps.parse.outputs.action }}
      environment: ${{ steps.parse.outputs.environment }}
      expected_subscription_id: ${{ steps.parse.outputs.expected_subscription_id }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Parse deployment request for sharedservices
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const expectedSubscription = 'sharedservices';
            const defaultEnvironment = 'shared';
            const body = context.payload.issue.body || '';

            core.setOutput('should_run', 'false');
            core.setOutput('action', 'plan');
            core.setOutput('environment', defaultEnvironment);
            core.setOutput('expected_subscription_id', '');

            function extractField(label) {
              const escaped = label.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
              const regex = new RegExp(`###\\s+${escaped}\\s*\\n+([\\s\\S]*?)(?=\\n###\\s+|$)`, 'i');
              const match = body.match(regex);
              if (!match) return '';
              return match[1]
                .trim()
                .split('\n')
                .map(line => line.trim())
                .filter(line => line && line !== '_No response_')
                .join(' ')
                .trim();
            }

            const rawSubscription = extractField('Deployment Subscription');
            if (!rawSubscription) {
              core.info('No deployment subscription field found. Skipping sharedservices workflow execution.');
              return;
            }

            const normalizedSubscription = rawSubscription.toLowerCase().replace(/[^a-z0-9]/g, '');
            const subscriptionAliases = {
              connectivity: 'connectivity',
              identity: 'identity',
              identitydev: 'identity',
              management: 'management',
              security: 'security',
              shared: 'sharedservices',
              sharedservice: 'sharedservices',
              sharedservices: 'sharedservices'
            };
            const subscription = subscriptionAliases[normalizedSubscription] || '';

            if (subscription !== expectedSubscription) {
              core.info(`Issue is for '${subscription}', skipping ${expectedSubscription} workflow execution.`);
              return;
            }

            const subscriptionId = extractField('Azure Subscription ID');
            const rawAction = extractField('Terraform Action') || 'plan';
            const rawEnvironment = extractField('GitHub Environment') || defaultEnvironment;
            const action = rawAction.toLowerCase().trim();

            const normalizedEnvironment = rawEnvironment.toLowerCase().replace(/[^a-z0-9]/g, '');
            const environmentAliases = {
              connectivity: 'connectivity',
              identity: 'identity',
              identitydev: 'identity',
              management: 'management',
              security: 'security',
              shared: 'shared',
              sharedservice: 'shared',
              sharedservices: 'shared',
              nonproduction: 'NonProduction'
            };
            const environment = environmentAliases[normalizedEnvironment] || rawEnvironment;

            if (!subscriptionId) {
              core.setFailed('Azure Subscription ID is required for deployment issues.');
              return;
            }

            if (!['plan', 'apply', 'destroy'].includes(action)) {
              core.setFailed(`Invalid Terraform Action '${rawAction}'.`);
              return;
            }

            core.setOutput('should_run', 'true');
            core.setOutput('action', action);
            core.setOutput('environment', environment);
            core.setOutput('expected_subscription_id', subscriptionId);

  terraform-plan:
    needs: issue-dispatch
    if: always() && (github.event_name == 'workflow_dispatch' || (github.event_name == 'issues' && needs.issue-dispatch.outputs.should_run == 'true'))
    runs-on: ubuntu-latest
    environment: shared
    env:
      DEPLOY_ENV: ${{ github.event_name == 'issues' && needs.issue-dispatch.outputs.environment || github.event.inputs.environment }}
      DEPLOY_ACTION: ${{ github.event_name == 'issues' && needs.issue-dispatch.outputs.action || github.event.inputs.action }}
      EXPECTED_SUBSCRIPTION_ID: ${{ github.event_name == 'issues' && needs.issue-dispatch.outputs.expected_subscription_id || github.event.inputs.expected_subscription_id }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout ptrn repo (tfvars)
        uses: actions/checkout@v4
        with:
          path: ptrn

      - name: Checkout gold repo (terraform root)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GOLDREPO_REPOSITORY }}
          ref: ${{ env.GOLDREPO_REF }}
          token: ${{ secrets.GOLDREPO_PAT || secrets.GITHUB_TOKEN }}
          path: goldrepo

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Validate Required ARM Secrets
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
        run: |
          MISSING_SECRETS=""

          if [ -z "$ARM_CLIENT_ID" ]; then
            MISSING_SECRETS="$MISSING_SECRETS ARM_CLIENT_ID"
          fi

          if [ -z "$ARM_TENANT_ID" ]; then
            MISSING_SECRETS="$MISSING_SECRETS ARM_TENANT_ID"
          fi

          if [ -z "$ARM_SUBSCRIPTION_ID" ]; then
            MISSING_SECRETS="$MISSING_SECRETS ARM_SUBSCRIPTION_ID"
          fi

          if [ -n "$MISSING_SECRETS" ]; then
            echo "Missing required secrets in GitHub Environment 'shared':$MISSING_SECRETS"
            exit 1
          fi

      - name: Azure Login (OIDC)
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Validate Requested Subscription ID
        if: ${{ env.EXPECTED_SUBSCRIPTION_ID != '' }}
        run: |
          REQUESTED_SUBSCRIPTION_ID="${{ env.EXPECTED_SUBSCRIPTION_ID }}"
          ACTUAL_SUBSCRIPTION_ID="${{ secrets.ARM_SUBSCRIPTION_ID }}"

          if [ "${REQUESTED_SUBSCRIPTION_ID,,}" != "${ACTUAL_SUBSCRIPTION_ID,,}" ]; then
            echo "Requested subscription ID does not match shared services workflow subscription ID."
            echo "Requested: ${REQUESTED_SUBSCRIPTION_ID}"
            echo "Actual: ${ACTUAL_SUBSCRIPTION_ID}"
            exit 1
          fi

      - name: Terraform Init
        working-directory: ./goldrepo/alz-platform/pattern1/sharedservices
        env:
          ARM_USE_OIDC: true
          ARM_OIDC_TOKEN: ${{ env.ACTIONS_ID_TOKEN_REQUEST_TOKEN }}
          ARM_OIDC_TOKEN_REQUEST_URL: ${{ env.ACTIONS_ID_TOKEN_REQUEST_URL }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          TF_VAR_environment: ${{ env.DEPLOY_ENV }}
        run: |
          terraform init \
            -backend-config="backend.tfvars" \
            -backend-config="use_azuread_auth=true" \
            -backend-config="use_oidc=true"

      - name: Terraform Format
        working-directory: ./goldrepo/alz-platform/pattern1/sharedservices
        continue-on-error: true
        run: terraform fmt -recursive

      - name: Terraform Validate
        working-directory: ./goldrepo/alz-platform/pattern1/sharedservices
        run: terraform validate

      - name: Terraform Plan
        working-directory: ./goldrepo/alz-platform/pattern1/sharedservices
        timeout-minutes: 30
        env:
          ARM_USE_OIDC: true
          ARM_OIDC_TOKEN: ${{ env.ACTIONS_ID_TOKEN_REQUEST_TOKEN }}
          ARM_OIDC_TOKEN_REQUEST_URL: ${{ env.ACTIONS_ID_TOKEN_REQUEST_URL }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          TF_VAR_environment: ${{ env.DEPLOY_ENV }}
        run: |
          TFVARS_FILE="${{ github.workspace }}/ptrn/alz-platform-vars/pattern1/sharedservices.tfvars"

          if [ ! -f "$TFVARS_FILE" ]; then
            echo "❌ tfvars file not found: $TFVARS_FILE"
            exit 1
          fi

          echo "Using tfvars file: $TFVARS_FILE"

          MAX_RETRIES=3
          RETRY=0
          while [ $RETRY -lt $MAX_RETRIES ]; do
            echo "Terraform plan attempt $((RETRY + 1))/$MAX_RETRIES"
            terraform plan \
              -var-file="$TFVARS_FILE" \
              -out=tfplan-sharedservices && break
            RETRY=$((RETRY + 1))
            if [ $RETRY -lt $MAX_RETRIES ]; then
              echo "Plan failed, waiting 30 seconds before retry..."
              sleep 30
            fi
          done

          if [ $RETRY -eq $MAX_RETRIES ]; then
            echo "❌ Failed to acquire state lock after $MAX_RETRIES attempts"
            exit 1
          fi

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-sharedservices
          path: ./goldrepo/alz-platform/pattern1/sharedservices/tfplan-sharedservices
          retention-days: 7

  approval:
    needs: [terraform-plan, issue-dispatch]
    runs-on: ubuntu-latest
    if: always() && needs.terraform-plan.result == 'success' && ((github.event_name == 'issues' && (needs.issue-dispatch.outputs.action == 'apply' || needs.issue-dispatch.outputs.action == 'destroy')) || (github.event_name == 'workflow_dispatch' && (github.event.inputs.action == 'apply' || github.event.inputs.action == 'destroy')))
    environment:
      name: ${{ github.event_name == 'issues' && needs.issue-dispatch.outputs.environment || github.event.inputs.environment }}
    steps:
      - name: Approval Checkpoint
        run: |
          echo "✅ Approval granted for shared services deployment to ${{ github.event_name == 'issues' && needs.issue-dispatch.outputs.environment || github.event.inputs.environment }}"

  terraform-apply:
    needs: [approval, issue-dispatch]
    runs-on: ubuntu-latest
    environment: shared
    if: always() && needs.approval.result == 'success' && ((github.event_name == 'issues' && needs.issue-dispatch.outputs.action == 'apply') || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'))
    env:
      DEPLOY_ENV: ${{ github.event_name == 'issues' && needs.issue-dispatch.outputs.environment || github.event.inputs.environment }}
      EXPECTED_SUBSCRIPTION_ID: ${{ github.event_name == 'issues' && needs.issue-dispatch.outputs.expected_subscription_id || github.event.inputs.expected_subscription_id }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout ptrn repo (tfvars)
        uses: actions/checkout@v4
        with:
          path: ptrn

      - name: Checkout gold repo (terraform root)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GOLDREPO_REPOSITORY }}
          ref: ${{ env.GOLDREPO_REF }}
          token: ${{ secrets.GOLDREPO_PAT || secrets.GITHUB_TOKEN }}
          path: goldrepo

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Validate Required ARM Secrets
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
        run: |
          MISSING_SECRETS=""

          if [ -z "$ARM_CLIENT_ID" ]; then
            MISSING_SECRETS="$MISSING_SECRETS ARM_CLIENT_ID"
          fi

          if [ -z "$ARM_TENANT_ID" ]; then
            MISSING_SECRETS="$MISSING_SECRETS ARM_TENANT_ID"
          fi

          if [ -z "$ARM_SUBSCRIPTION_ID" ]; then
            MISSING_SECRETS="$MISSING_SECRETS ARM_SUBSCRIPTION_ID"
          fi

          if [ -n "$MISSING_SECRETS" ]; then
            echo "Missing required secrets in GitHub Environment 'shared':$MISSING_SECRETS"
            exit 1
          fi

      - name: Azure Login (OIDC)
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Validate Requested Subscription ID
        if: ${{ env.EXPECTED_SUBSCRIPTION_ID != '' }}
        run: |
          REQUESTED_SUBSCRIPTION_ID="${{ env.EXPECTED_SUBSCRIPTION_ID }}"
          ACTUAL_SUBSCRIPTION_ID="${{ secrets.ARM_SUBSCRIPTION_ID }}"

          if [ "${REQUESTED_SUBSCRIPTION_ID,,}" != "${ACTUAL_SUBSCRIPTION_ID,,}" ]; then
            echo "Requested subscription ID does not match shared services workflow subscription ID."
            echo "Requested: ${REQUESTED_SUBSCRIPTION_ID}"
            echo "Actual: ${ACTUAL_SUBSCRIPTION_ID}"
            exit 1
          fi

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-sharedservices
          path: ./goldrepo/alz-platform/pattern1/sharedservices

      - name: Terraform Init
        working-directory: ./goldrepo/alz-platform/pattern1/sharedservices
        env:
          ARM_USE_OIDC: true
          ARM_OIDC_TOKEN: ${{ env.ACTIONS_ID_TOKEN_REQUEST_TOKEN }}
          ARM_OIDC_TOKEN_REQUEST_URL: ${{ env.ACTIONS_ID_TOKEN_REQUEST_URL }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          TF_VAR_environment: ${{ env.DEPLOY_ENV }}
        run: |
          terraform init \
            -backend-config="backend.tfvars" \
            -backend-config="use_azuread_auth=true" \
            -backend-config="use_oidc=true"

      - name: Terraform Apply
        timeout-minutes: 60
        working-directory: ./goldrepo/alz-platform/pattern1/sharedservices
        env:
          ARM_USE_OIDC: true
          ARM_OIDC_TOKEN: ${{ env.ACTIONS_ID_TOKEN_REQUEST_TOKEN }}
          ARM_OIDC_TOKEN_REQUEST_URL: ${{ env.ACTIONS_ID_TOKEN_REQUEST_URL }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          TF_VAR_environment: ${{ env.DEPLOY_ENV }}
        run: |
          if [ -f "tfplan-sharedservices" ]; then
            terraform apply -auto-approve "tfplan-sharedservices"
          else
            echo "❌ Plan file not found. Skipping apply."
            exit 1
          fi

  terraform-destroy:
    needs: [approval, issue-dispatch]
    runs-on: ubuntu-latest
    environment: shared
    if: always() && needs.approval.result == 'success' && ((github.event_name == 'issues' && needs.issue-dispatch.outputs.action == 'destroy') || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'))
    env:
      DEPLOY_ENV: ${{ github.event_name == 'issues' && needs.issue-dispatch.outputs.environment || github.event.inputs.environment }}
      EXPECTED_SUBSCRIPTION_ID: ${{ github.event_name == 'issues' && needs.issue-dispatch.outputs.expected_subscription_id || github.event.inputs.expected_subscription_id }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout ptrn repo (tfvars)
        uses: actions/checkout@v4
        with:
          path: ptrn

      - name: Checkout gold repo (terraform root)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GOLDREPO_REPOSITORY }}
          ref: ${{ env.GOLDREPO_REF }}
          token: ${{ secrets.GOLDREPO_PAT || secrets.GITHUB_TOKEN }}
          path: goldrepo

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Validate Required ARM Secrets
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
        run: |
          MISSING_SECRETS=""

          if [ -z "$ARM_CLIENT_ID" ]; then
            MISSING_SECRETS="$MISSING_SECRETS ARM_CLIENT_ID"
          fi

          if [ -z "$ARM_TENANT_ID" ]; then
            MISSING_SECRETS="$MISSING_SECRETS ARM_TENANT_ID"
          fi

          if [ -z "$ARM_SUBSCRIPTION_ID" ]; then
            MISSING_SECRETS="$MISSING_SECRETS ARM_SUBSCRIPTION_ID"
          fi

          if [ -n "$MISSING_SECRETS" ]; then
            echo "Missing required secrets in GitHub Environment 'shared':$MISSING_SECRETS"
            exit 1
          fi

      - name: Azure Login (OIDC)
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Validate Requested Subscription ID
        if: ${{ env.EXPECTED_SUBSCRIPTION_ID != '' }}
        run: |
          REQUESTED_SUBSCRIPTION_ID="${{ env.EXPECTED_SUBSCRIPTION_ID }}"
          ACTUAL_SUBSCRIPTION_ID="${{ secrets.ARM_SUBSCRIPTION_ID }}"

          if [ "${REQUESTED_SUBSCRIPTION_ID,,}" != "${ACTUAL_SUBSCRIPTION_ID,,}" ]; then
            echo "Requested subscription ID does not match shared services workflow subscription ID."
            echo "Requested: ${REQUESTED_SUBSCRIPTION_ID}"
            echo "Actual: ${ACTUAL_SUBSCRIPTION_ID}"
            exit 1
          fi

      - name: Terraform Init
        working-directory: ./goldrepo/alz-platform/pattern1/sharedservices
        env:
          ARM_USE_OIDC: true
          ARM_OIDC_TOKEN: ${{ env.ACTIONS_ID_TOKEN_REQUEST_TOKEN }}
          ARM_OIDC_TOKEN_REQUEST_URL: ${{ env.ACTIONS_ID_TOKEN_REQUEST_URL }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          TF_VAR_environment: ${{ env.DEPLOY_ENV }}
        run: |
          terraform init \
            -backend-config="backend.tfvars" \
            -backend-config="use_azuread_auth=true" \
            -backend-config="use_oidc=true"

      - name: Terraform Destroy
        timeout-minutes: 60
        working-directory: ./goldrepo/alz-platform/pattern1/sharedservices
        env:
          ARM_USE_OIDC: true
          ARM_OIDC_TOKEN: ${{ env.ACTIONS_ID_TOKEN_REQUEST_TOKEN }}
          ARM_OIDC_TOKEN_REQUEST_URL: ${{ env.ACTIONS_ID_TOKEN_REQUEST_URL }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          TF_VAR_environment: ${{ env.DEPLOY_ENV }}
        run: |
          TFVARS_FILE="${{ github.workspace }}/ptrn/alz-platform-vars/pattern1/sharedservices.tfvars"

          if [ ! -f "$TFVARS_FILE" ]; then
            echo "❌ tfvars file not found: $TFVARS_FILE"
            exit 1
          fi

          terraform destroy -auto-approve -var-file="$TFVARS_FILE"

  deployment-summary:
    needs: [terraform-plan, issue-dispatch]
    runs-on: ubuntu-latest
    if: always() && needs.terraform-plan.result != 'skipped'
    steps:
      - name: Generate Deployment Summary
        run: |
          echo "## 🎯 ALZ Shared Services Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ github.event_name == 'issues' && needs.issue-dispatch.outputs.environment || github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Action:** ${{ github.event_name == 'issues' && needs.issue-dispatch.outputs.action || github.event.inputs.action }}" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow Run:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
