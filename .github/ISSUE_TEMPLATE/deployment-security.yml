name: Deployment Request - Security
description: Request a security deployment.
title: "[Deployment][security]: "
labels:
  - deployment
body:
  - type: markdown
    attributes:
      value: |
        Use this form to request a security deployment.

  - type: dropdown
    id: region
    attributes:
      label: Azure Region
      description: Select the region where deployment should run.
      options:
        - eastus
        - westus2
        - centralus
        - northeurope
        - westeurope
        - uksouth
        - southeastasia
        - australiaeast
    validations:
      required: true

  - type: dropdown
    id: subscription
    attributes:
      label: Deployment Subscription
      description: Target subscription for this request.
      options:
        - security
      default: 0
    validations:
      required: true

  - type: input
    id: subscription_id
    attributes:
      label: Azure Subscription ID
      description: Enter the exact Azure subscription GUID.
      placeholder: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
    validations:
      required: true

  - type: dropdown
    id: action
    attributes:
      label: Terraform Action
      description: Choose the Terraform operation.
      options:
        - plan
        - apply
        - destroy
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: GitHub Environment
      options:
        - security
      default: 0
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional Notes
      description: Any constraints, approvals, or change ticket references.
    validations:
      required: false
